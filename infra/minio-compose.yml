services:
  minio:
    image: minio/minio:latest
    container_name: couple-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - /home/river/.openclaw/workspace/couple-relationship-copilot/.data/minio:/data
    command: server /data --console-address ":9001"
